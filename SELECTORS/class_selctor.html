<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title> CSS SELECTORS</title>
    <style>
         div{
            background-color: red;
        }
        .red {
            background-color: aqua;
        }
        .green{
            background-color:green;
        }
        .yello{
            background-color: aqua;
        }
        /* child selector */
        div> p{
            color:aqua;
            background-color: blueviolet;
            
        }
        .blue{
            color: blueviolet;
            background-color: yellow;
        }
       
    </style>
</head>

<body>
    <div class="red">
        i am amol kore.
        <p>
            cristiano is my frind
        </p>

    </div>
    <div>
      cristiano ronaldo is the greatest footballer of all time.
            <p class="blue">
            cristiano is my frind
        </p>

    </div>
    <div class="green">
       <a class="yello" href="google.com"> <center  class="yello">click here</center> </a>
    </div>
</body>


</html>
