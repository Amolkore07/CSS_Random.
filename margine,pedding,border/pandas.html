<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator UI</title>
  <style>

body {
  background: blanchedalmond;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  
}

.calculator {
  background: black;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 0 20pX black;
  width: 280px;
}

.display {
  width: 100%;
  height: 60px;
  font-size: 24px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-bottom: 15px;
  background: black;
  
color:blanchedalmond;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 50px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #555;
  color: white;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background: #777;
}

button.operator {
  background: #f57c00;
}

button.clear {
  background: #d32f2f;
}

button.equal {
  background: #388e3c;
  grid-column: span 4;
}



  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" class="display" disabled placeholder="0" />
    <div class="buttons">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">/</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">*</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">-</button>

      <button>0</button>
      <button>.</button>
      <button class="clear">C</button>
      <button class="operator">+</button>

      <button class="equal">=</button>
    </div>
  </div>
</body>
</html>
