<!DOCTYPE html>
<html>
<head>
<title>Margin, Padding, and Border Example</title>
<style>
.container {
  width: 300px;
  border: 2px solid black;
  padding: 20px;
  margin: 10px;
  background-color: lightblue;
}

.content {
  background-color: yellow;
  padding: 10px;
  border: 1px dashed red;
  margin: 5px;
}
</style>
</head>
<body>

<div class="container">
  <div class="content">
    This is the content inside the box.
  </div>
</div>

</body>
</html>
